<!-- TOPBAR -->
<header class="topbar">
    <div class="brand">
        <span class="brand-name">NationInsight</span>
        <span class="brand-sub">Nation Capital</span>
    </div>
    <input class="search-bar" type="text" placeholder="Buscar insights, colaboradores...">
    <div class="topbar-right">
        <div class="pontos-badge">
            <div>
                <span>Meus Pontos</span>
                <strong id="pontosTopbar">0</strong>
            </div>
        </div>

        <!-- Botão de notificações -->
        <div class="notif-wrapper" id="notifWrapper">
            <button class="notif-btn" id="notifBtn" onclick="toggleNotifModal(event)" aria-label="Notificações">
                🔔<span class="notif-dot" id="notifDot">3</span>
            </button>

            <!-- Modal de notificações (dropdown inline) -->
            <div class="notif-modal" id="notifModal" style="display:none;" role="dialog" aria-label="Painel de notificações">
                <div class="notif-modal-header">
                    <span class="notif-modal-title">Notificações</span>
                    <button class="notif-mark-all" onclick="marcarTodasLidas()" title="Marcar todas como lidas">✓ Marcar todas</button>
                </div>
                <div class="notif-list" id="notifList">
                    <!-- preenchido pelo JS abaixo -->
                </div>
                <div class="notif-modal-footer">
                    <span class="notif-footer-txt">Ver todas as notificações →</span>
                </div>
            </div>
        </div>

        <div class="user-info">
            <div class="user-avatar" id="topbarAvatarIniciais">--</div>
            <div>
                <div class="user-name-top" id="topbarNome">Carregando...</div>
                <div class="user-role-top" id="topbarCargo">--</div>
            </div>
        </div>
    </div>
</header>

<!-- ── ESTILOS DO MODAL DE NOTIFICAÇÕES ── -->
<style>
.notif-wrapper {
    position: relative;
}

.notif-modal {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: 340px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
    z-index: 9999;
    overflow: hidden;
    animation: notifFadeIn .18s ease;
}

@keyframes notifFadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
}

.notif-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid #f0f0f0;
}

.notif-modal-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: #1a1a2e;
}

.notif-mark-all {
    background: none;
    border: none;
    font-size: 11px;
    color: #3a5fc8;
    cursor: pointer;
    font-family: 'Open Sans', sans-serif;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background .15s;
}
.notif-mark-all:hover { background: #eef2ff; }

.notif-list {
    max-height: 320px;
    overflow-y: auto;
}

.notif-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid #f5f5f5;
    cursor: pointer;
    transition: background .15s;
    position: relative;
}
.notif-item:hover { background: #f8f9ff; }
.notif-item.lida { opacity: .65; }

.notif-item-icon {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 1px;
}

.notif-item-body { flex: 1; min-width: 0; }

.notif-item-titulo {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 12.5px;
    color: #1a1a2e;
    line-height: 1.3;
    margin-bottom: 2px;
}

.notif-item-desc {
    font-size: 11.5px;
    color: #666;
    font-family: 'Open Sans', sans-serif;
    line-height: 1.4;
}

.notif-item-tempo {
    font-size: 10px;
    color: #aaa;
    margin-top: 3px;
    font-family: 'Open Sans', sans-serif;
}

.notif-unread-dot {
    width: 8px;
    height: 8px;
    background: #3a5fc8;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
}

.notif-item.lida .notif-unread-dot { display: none; }

.notif-modal-footer {
    padding: 10px 16px;
    text-align: center;
    background: #fafafa;
    border-top: 1px solid #f0f0f0;
}
.notif-footer-txt {
    font-size: 12px;
    color: #3a5fc8;
    font-family: 'Open Sans', sans-serif;
    cursor: pointer;
    font-weight: 600;
}
.notif-footer-txt:hover { text-decoration: underline; }

.notif-vazia {
    padding: 32px 16px;
    text-align: center;
    color: #aaa;
    font-family: 'Open Sans', sans-serif;
    font-size: 13px;
}
</style>

<script>
(function initTopbar() {
    // ── Dados do usuário ──────────────────────────────────────────────────────
    try {
        const usu = JSON.parse(localStorage.getItem('ni_usuario') || 'null');
        if (usu) {
            const elPontos   = document.getElementById('pontosTopbar');
            const elNome     = document.getElementById('topbarNome');
            const elCargo    = document.getElementById('topbarCargo');
            const elIniciais = document.getElementById('topbarAvatarIniciais');

            if (elPontos)   elPontos.textContent   = usu.pontos    ?? 0;
            if (elNome)     elNome.textContent      = usu.nome      || 'Usuário';
            if (elCargo)    elCargo.textContent     = usu.cargo     || 'Colaborador';
            if (elIniciais) elIniciais.textContent  = usu.iniciais  || '?';
        }
    } catch(e) { console.error('Topbar init error:', e); }

    // ── Atualiza pontos ao vivo (chamado por ideias.js e recompensas.js) ──────
    window.atualizarPontosTopbar = function(novoSaldo) {
        const el = document.getElementById('pontosTopbar');
        if (el) el.textContent = novoSaldo;
        try {
            const usu = JSON.parse(localStorage.getItem('ni_usuario') || 'null');
            if (usu) { usu.pontos = novoSaldo; localStorage.setItem('ni_usuario', JSON.stringify(usu)); }
        } catch(e) {}
    };

    // ── Notificações fictícias ────────────────────────────────────────────────
    const NOTIFICACOES = [
        {
            id: 1,
            icon: '✅',
            titulo: 'Ideia Aprovada!',
            desc: 'Sua ideia "Automação de Relatórios com IA" foi aprovada pela equipe gestora.',
            tempo: 'há 10 minutos',
            lida: false,
        },
        {
            id: 2,
            icon: '⭐',
            titulo: 'Você ganhou 50 pontos',
            desc: 'Parabéns! Sua nova ideia foi registrada e você recebeu 50 pontos de bônus.',
            tempo: 'há 1 hora',
            lida: false,
        },
        {
            id: 3,
            icon: '🔍',
            titulo: 'Ideia em Análise',
            desc: 'Sua ideia "Novo Fluxo de Onboarding" entrou em análise pelo gestor de RH.',
            tempo: 'há 3 horas',
            lida: false,
        },
        {
            id: 4,
            icon: '🏆',
            titulo: 'Ranking atualizado',
            desc: 'Você subiu para o Top 5 de inovadores do mês. Continue assim!',
            tempo: 'ontem',
            lida: true,
        },
        {
            id: 5,
            icon: '🎁',
            titulo: 'Nova recompensa disponível',
            desc: 'O benefício "Troféu Inovador do Mês" foi adicionado ao catálogo de recompensas.',
            tempo: '2 dias atrás',
            lida: true,
        },
    ];

    // Renderiza a lista de notificações
    function renderNotifList() {
        const list = document.getElementById('notifList');
        if (!list) return;

        const naoLidas = NOTIFICACOES.filter(n => !n.lida);

        if (NOTIFICACOES.length === 0) {
            list.innerHTML = '<div class="notif-vazia">🔕 Nenhuma notificação por enquanto.</div>';
            return;
        }

        list.innerHTML = NOTIFICACOES.map(n => `
            <div class="notif-item ${n.lida ? 'lida' : ''}" onclick="marcarLida(${n.id})">
                <div class="notif-item-icon">${n.icon}</div>
                <div class="notif-item-body">
                    <div class="notif-item-titulo">${n.titulo}</div>
                    <div class="notif-item-desc">${n.desc}</div>
                    <div class="notif-item-tempo">${n.tempo}</div>
                </div>
                <div class="notif-unread-dot"></div>
            </div>
        `).join('');

        // Atualiza badge
        const dot = document.getElementById('notifDot');
        if (dot) {
            const count = naoLidas.length;
            dot.textContent = count;
            dot.style.display = count > 0 ? 'flex' : 'none';
        }
    }

    // Abre/fecha o modal
    window.toggleNotifModal = function(e) {
        e.stopPropagation();
        const modal = document.getElementById('notifModal');
        if (!modal) return;
        const aberto = modal.style.display !== 'none';
        modal.style.display = aberto ? 'none' : 'block';
        if (!aberto) renderNotifList();
    };

    // Marca uma notificação como lida
    window.marcarLida = function(id) {
        const notif = NOTIFICACOES.find(n => n.id === id);
        if (notif) { notif.lida = true; renderNotifList(); }
    };

    // Marca todas como lidas
    window.marcarTodasLidas = function() {
        NOTIFICACOES.forEach(n => n.lida = true);
        renderNotifList();
    };

    // Fecha o modal ao clicar fora dele
    document.addEventListener('click', function(e) {
        const wrapper = document.getElementById('notifWrapper');
        const modal   = document.getElementById('notifModal');
        if (modal && wrapper && !wrapper.contains(e.target)) {
            modal.style.display = 'none';
        }
    });

    // Renderização inicial do badge
    renderNotifList();
})();
</script>
