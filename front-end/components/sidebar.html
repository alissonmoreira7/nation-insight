<script>
    (function initSidebar() {
        try {
            const usu = JSON.parse(localStorage.getItem('ni_usuario') || 'null');
            if (usu) {
                const elNome     = document.getElementById('sidebarNome');
                const elCargo    = document.getElementById('sidebarCargo');
                const elIniciais = document.getElementById('sidebarAvatarIniciais');

                if (elNome)     elNome.textContent     = usu.nome    || 'Usuário';
                if (elCargo)    elCargo.textContent     = usu.cargo   || 'Colaborador';
                if (elIniciais) elIniciais.textContent  = usu.iniciais || '?';
            }
        } catch(e) { console.error('Sidebar init error:', e); }
    })();
</script>
