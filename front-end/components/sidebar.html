<script>
(function initSidebar() {
    try {
        const usu = JSON.parse(localStorage.getItem('ni_usuario') || 'null');
        if (!usu) return;

        const el     = (id) => document.getElementById(id);
        const perfil = String(usu.tipo || usu.perfilacesso_usu || usu.perfil || '').toLowerCase();

        // Preenche dados do usuário
        if (el('sidebarNome'))           el('sidebarNome').textContent           = usu.nome     || 'Usuário';
        if (el('sidebarCargo'))          el('sidebarCargo').textContent          = usu.cargo    || 'Colaborador';
        if (el('sidebarAvatarIniciais')) el('sidebarAvatarIniciais').textContent = usu.iniciais || '??';

        // Esconde TUDO que não é padrão e depois mostra o que cada perfil precisa
        const show = (id) => { const a = el(id); if (a) a.style.display = 'flex'; };
        const hide = (id) => { const a = el(id); if (a) a.style.display = 'none';  };

        if (perfil === 'colaborador') {
            // dashboard ✔ | minhas ideias ✔ | recompensas ✔ | configurações ✔
            // (todos visíveis por padrão — nada a fazer)

        } else if (perfil === 'gestor') {
            // dashboard ✔ | minhas ideias ✔ | gestão ideias ✔ | recompensas ✔ | configurações ✔
            show('nav-gestao-ideias');

        } else if (perfil === 'admin') {
            // dashboard ✔ | gestão ideias ✔ | gestão usuários ✔ | configurações ✔
            hide('nav-ideias');
            hide('nav-recompensas');
            show('nav-admin-ideias');
            show('nav-admin-usuarios');
        }

        // Marca item ativo com base na URL atual
        const paginaAtual = window.location.pathname.split('/').pop();
        const mapaAtivo = {
            'dashboard.html':       'nav-dashboard',
            'ideias.html':          'nav-ideias',
            'gestor-ideias.html':   perfil === 'admin' ? 'nav-admin-ideias' : 'nav-gestao-ideias',
            'gestao-usuarios.html': 'nav-admin-usuarios',
            'recompensas.html':     'nav-recompensas',
            'configuracoes.html':   'nav-configuracoes',
        };
        const idAtivo = mapaAtivo[paginaAtual];
        if (idAtivo && el(idAtivo)) el(idAtivo).classList.add('active');

    } catch (e) { console.error('Sidebar init error:', e); }
})();
</script>
