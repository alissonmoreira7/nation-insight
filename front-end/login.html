<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NationInsight</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/coresgerais.css">
  </head>

  <body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="login-wrap">
      <!-- Lado esquerdo — branding -->
      <div class="login-brand">
        <img src="imagens/logonation.png" class="brand-logo" alt="Logo da NationInsight">
        <div class="brand-sub">Plataforma de gestão de ideias e inovação da NationCapital</div>
        <div class="brand-badges">
          <div class="brand-badge"><span></span> Submeta suas ideias</div>
          <div class="brand-badge"><span></span> Ganhe pontos e recompensas</div>
          <div class="brand-badge"><span></span> Acompanhe o progresso</div>
        </div>
      </div>

      <!-- Lado direito — formulário -->
      <div class="login-form-wrap">
        <div class="form-title" id="formTitulo">Bem-vindo</div>
        <div class="form-sub" id="formSub">Entre com sua conta para continuar</div>

        <div class="alerta" id="alerta"></div>

        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="fEmail" placeholder="seu@email.com" autocomplete="email">
          <div class="erro-msg" id="errEmail">Informe um e-mail válido</div>
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="fSenha" placeholder="••••••••" autocomplete="current-password">
          <div class="erro-msg" id="errSenha">Informe sua senha</div>
        </div>

        <div class="form-group" id="campoNome" style="display:none">
          <label>Nome completo</label>
          <input type="text" id="fNome" placeholder="Ana Costa">
          <div class="erro-msg" id="errNome">Informe seu nome</div>
        </div>

        <button class="btn-login" id="btnSubmit" onclick="submeter()">Entrar</button>
        <div class="divider">ou</div>

        <div class="form-footer">
          <span id="footerTexto">Não tem conta?</span>
          <a href="#" id="btnAlternar" onclick="alternarModo(event)">Criar conta</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>

    <script>
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let particlesArray = [];

      // Captura a posição do mouse
      let mouse = {
          x: null,
          y: null,
          radius: 120 // Área de atração do mouse
      };

      window.addEventListener('mousemove', function(event) {
          mouse.x = event.x;
          mouse.y = event.y;
      });

      // Remove a atração se o mouse sair da tela
      window.addEventListener('mouseout', function() {
          mouse.x = undefined;
          mouse.y = undefined;
      });

      // Classe que cria cada bolinha
      class Particle {
          constructor(x, y, directionX, directionY, size, color) {
              this.x = x;
              this.y = y;
              this.directionX = directionX;
              this.directionY = directionY;
              this.size = size;
              this.color = color;
              this.baseX = this.x;
              this.baseY = this.y;
              this.density = (Math.random() * 30) + 1; // Peso da bolinha
          }

          // Desenha a bolinha na tela
          draw() {
              ctx.beginPath();
              ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
              ctx.fillStyle = this.color;
              ctx.fill();
          }

          // Atualiza a posição e faz a interação com o mouse
          update() {
              // Verifica colisão com as bordas para elas quicarem
              if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
              if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

              // Matemática de atração do mouse
              let dx = mouse.x - this.x;
              let dy = mouse.y - this.y;
              let distance = Math.sqrt(dx * dx + dy * dy);
              
              let forceDirectionX = dx / distance;
              let forceDirectionY = dy / distance;
              let maxDistance = mouse.radius;
              let force = (maxDistance - distance) / maxDistance;
              let directionX = forceDirectionX * force * this.density;
              let directionY = forceDirectionY * force * this.density;

              if (distance < mouse.radius) {
                  this.x += directionX;
                  this.y += directionY;
              } else {
                  // Movimento natural solto
                  this.x += this.directionX;
                  this.y += this.directionY;
              }

              this.draw();
          }
      }

      // Inicializa o vetor de bolinhas
      function init() {
          particlesArray = [];
          let numberOfParticles = (canvas.height * canvas.width) / 9000; // Quantidade baseada na tela
          
          // Cores do seu tema (Branco e Dourado com transparência)
          const colors = ['rgba(255, 255, 255, 0.3)', 'rgba(212, 175, 55, 0.4)']; 

          for (let i = 0; i < numberOfParticles; i++) {
              let size = (Math.random() * 3) + 1; // Tamanho de 1px a 4px
              let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
              let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
              let directionX = (Math.random() * 2) - 1; // Velocidade X
              let directionY = (Math.random() * 2) - 1; // Velocidade Y
              let color = colors[Math.floor(Math.random() * colors.length)];

              particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
          }
      }

      // Loop de animação (Roda 60x por segundo)
      function animate() {
          requestAnimationFrame(animate);
          ctx.clearRect(0, 0, innerWidth, innerHeight); // Limpa o rastro

          for (let i = 0; i < particlesArray.length; i++) {
              particlesArray[i].update();
          }
      }

      // Recalcula se o usuário redimensionar a janela
      window.addEventListener('resize', function() {
          canvas.width = innerWidth;
          canvas.height = innerHeight;
          init();
      });

      // Chama as funções para iniciar
      init();
      animate();
    </script>
  </body>
</html>
