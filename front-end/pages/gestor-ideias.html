<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NationInsight — Gestão de Ideias</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/coresgerais.css">
    <link rel="stylesheet" href="../css/ideias.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <style>
      /* ── Cards ── */
      .ideia-card { background:#fff; border:1px solid #e8ecf0; border-radius:12px; padding:20px 24px; margin-bottom:16px; transition:box-shadow .2s; }
      .ideia-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); }
      .ideia-card__header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
      .ideia-card__titulo  { font-weight:600; font-size:1rem; margin-right:8px; }
      .ideia-card__autor   { font-size:.85rem; color:#666; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
      .ideia-card__cargo   { background:#f0f2f5; border-radius:4px; padding:1px 6px; font-size:.78rem; }
      .ideia-card__depto   { background:#eff6ff; color:#1d4ed8; border-radius:4px; padding:1px 6px; font-size:.78rem; }
      .ideia-card__desc    { font-size:.9rem; color:#444; margin:8px 0; line-height:1.5; }
      .ideia-card__feedback{ background:#fffbe6; border-left:3px solid #f5a623; padding:8px 12px; border-radius:4px; font-size:.85rem; margin:8px 0; }
      .ideia-card__footer  { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
      .ideia-card__meta    { color:#888; font-size:.85rem; }
      .ideia-card__actions { display:flex; gap:8px; }

      /* ── Badges ── */
      .badge { display:inline-block; border-radius:20px; padding:2px 10px; font-size:.75rem; font-weight:600; }
      .badge--pendente      { background:#f0f2f5; color:#555; }
      .badge--analise       { background:#fff4e0; color:#d98200; }
      .badge--aprovada      { background:#e6f9ef; color:#1a7a42; }
      .badge--rejeitada     { background:#fde8e8; color:#c0392b; }
      .badge--implementada  { background:#f0eaff; color:#6d28d9; }

      /* ── Botões ── */
      .btn { cursor:pointer; border:none; border-radius:8px; padding:8px 14px; font-family:inherit; font-size:.85rem; font-weight:500; transition:opacity .15s; }
      .btn:hover { opacity:.85; }
      .btn--primary { background:var(--azul,#2563eb); color:#fff; }
      .btn--outline { background:transparent; border:1.5px solid #d1d5db; color:#374151; }
      .btn--sm { padding:6px 12px; }

      /* ── Modais ── */
      .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
      .modal-backdrop.aberto { display:flex; }
      .modal { background:#fff; border-radius:14px; padding:28px 32px; width:100%; max-width:480px; box-shadow:0 8px 40px rgba(0,0,0,.18); }
      .modal__header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
      .modal__titulo { font-size:1.1rem; font-weight:600; }
      .modal__close  { background:none; border:none; cursor:pointer; font-size:1.2rem; color:#888; }
      .form-group { margin-bottom:16px; }
      .form-group label { display:block; font-size:.85rem; font-weight:500; margin-bottom:6px; color:#374151; }
      .form-group select,
      .form-group textarea,
      .form-group input[type="number"] { width:100%; border:1.5px solid #d1d5db; border-radius:8px; padding:9px 12px; font-family:inherit; font-size:.9rem; transition:border-color .15s; box-sizing:border-box; }
      .form-group select:focus,
      .form-group textarea:focus,
      .form-group input[type="number"]:focus { border-color:var(--azul,#2563eb); outline:none; }
      .form-group textarea { resize:vertical; min-height:90px; }
      .modal__actions { display:flex; justify-content:flex-end; gap:10px; margin-top:8px; }

      /* ── Toast ── */
      .toast { position:fixed; bottom:24px; right:24px; z-index:9999; background:#1e293b; color:#fff; padding:12px 20px; border-radius:10px; font-size:.9rem; max-width:360px; opacity:0; transform:translateY(8px); transition:opacity .25s,transform .25s; pointer-events:none; }
      .toast--visivel { opacity:1; transform:translateY(0); }
      .toast--sucesso { background:#166534; }
      .toast--erro    { background:#991b1b; }

      /* ── Empty / erro / skeleton ── */
      .empty-state,.erro-state { text-align:center; padding:48px 24px; color:#888; }
      .empty-icon { font-size:2.5rem; display:block; margin-bottom:12px; }
      #skeleton { padding:16px; }
      .sk-line { background:#e8ecf0; border-radius:6px; height:18px; margin-bottom:10px; animation:pulse 1.4s ease-in-out infinite; }
      .sk-line--short { width:40%; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    </style>
  </head>
  <body>
    <div id="topbar-container"></div>

    <div class="layout">
      <div id="sidebar-container"></div>

      <main class="main">

        <!-- HERO -->
        <div class="hero-banner">
          <div>
            <div class="hero-greeting" id="heroTitulo">Ideias do Departamento</div>
            <div class="hero-sub" id="heroSub">
              Avalie e comente as ideias do departamento <strong id="labelDepartamento"></strong>.
            </div>
          </div>
        </div>

        <div class="content">

          <!-- KPIs -->
          <div class="kpis-grid" id="kpiGrid">
            <div class="kpi-card">
              <div class="kpi-header"><span class="kpi-label">Total</span><span class="kpi-icon">💡</span></div>
              <div class="kpi-valor" id="kpiTotal">0</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-header"><span class="kpi-label">Pendentes</span><span class="kpi-icon">🕐</span></div>
              <div class="kpi-valor" id="kpiPendente">0</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-header"><span class="kpi-label">Em Análise</span><span class="kpi-icon" style="color:var(--laranja)">⏱</span></div>
              <div class="kpi-valor" style="color:var(--laranja)" id="kpiAnalise">0</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-header"><span class="kpi-label">Aprovadas</span><span class="kpi-icon" style="color:var(--verde)">✅</span></div>
              <div class="kpi-valor" style="color:var(--verde)" id="kpiAprovada">0</div>
            </div>
          </div>

          <!-- FILTROS -->
          <div class="toolbar">
            <div class="filtros" id="filtrosContainer">
              <button class="filtro-btn active" onclick="filtrar('todas', this)">
                Todas (<span id="cntTodas">0</span>)
              </button>
              <button class="filtro-btn" onclick="filtrar('Pendente', this)">
                Pendente (<span id="cntPendente">0</span>)
              </button>
              <button class="filtro-btn" onclick="filtrar('Em Análise', this)">
                Em Análise (<span id="cntAnalise">0</span>)
              </button>
              <button class="filtro-btn" onclick="filtrar('Aprovada', this)">
                Aprovada (<span id="cntAprovada">0</span>)
              </button>
            </div>
          </div>

          <!-- SKELETON -->
          <div id="skeleton">
            <div class="sk-line"></div>
            <div class="sk-line sk-line--short"></div>
            <div class="sk-line"></div>
          </div>

          <!-- LISTA -->
          <div id="listaIdeias"></div>

        </div>
      </main>
    </div>

    <!-- MODAL AVALIAÇÃO -->
    <div class="modal-backdrop" id="modalAvaliacao">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal__header">
          <span class="modal__titulo">Avaliar Ideia</span>
          <button class="modal__close" onclick="fecharModalAvaliacao()">✕</button>
        </div>
        <p id="modalAvaliacaoTitulo" style="font-weight:600;margin-bottom:16px;"></p>
        <form onsubmit="submeterAvaliacao(event)">
          <div class="form-group">
            <label for="selectStatus">Novo Status *</label>
            <select id="selectStatus" required onchange="toggleCampoPontosCustom()">
              <option value="">Selecione…</option>
              <option value="Em Análise">Em Análise (+25 pts)</option>
              <option value="Aprovada">Aprovada (+75 pts)</option>
              <option value="Rejeitada">Rejeitada</option>
            </select>
          </div>
          <div class="form-group" id="wrapperPontosCustom" style="display:none;">
            <label for="inputPontosCustom">Pontos personalizados (opcional)</label>
            <input type="number" id="inputPontosCustom" min="0" max="9999"
                   placeholder="Vazio = 75 pts padrão">
          </div>
          <div class="form-group">
            <label for="textFeedback">Feedback para o colaborador</label>
            <textarea id="textFeedback" rows="3" placeholder="Escreva um comentário…"></textarea>
          </div>
          <div class="modal__actions">
            <button type="button" class="btn btn--outline" onclick="fecharModalAvaliacao()">Cancelar</button>
            <button type="submit" class="btn btn--primary" id="btnSalvarAvaliacao">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- MODAL COMENTÁRIO -->
    <div class="modal-backdrop" id="modalComentario">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal__header">
          <span class="modal__titulo">Comentar Ideia</span>
          <button class="modal__close" onclick="fecharModalComentario()">✕</button>
        </div>
        <p id="modalComentarioTitulo" style="font-weight:600;margin-bottom:16px;"></p>
        <form onsubmit="submeterComentario(event)">
          <div class="form-group">
            <label for="textComentario">Comentário *</label>
            <textarea id="textComentario" rows="4" required placeholder="Escreva seu comentário…"></textarea>
          </div>
          <div class="modal__actions">
            <button type="button" class="btn btn--outline" onclick="fecharModalComentario()">Cancelar</button>
            <button type="submit" class="btn btn--primary" id="btnEnviarComentario">Enviar</button>
          </div>
        </form>
      </div>
    </div>

  <!-- ══════════════════════════════════════════════════════════
    SNIPPET: colar antes de </body> em gestor-ideias.html
    e em qualquer outra página que use comentarios-modal.js
  ═══════════════════════════════════════════════════════════ -->

  <!-- Modal VER comentários (leitura) -->
  <div class="modal-backdrop" id="modalVerComentarios">
    <div class="modal-box" role="dialog" aria-modal="true">
      <div class="modal-box__header">
        <span class="modal-box__titulo" id="modalComentariosTitulo">Comentários</span>
        <button class="modal-box__close" onclick="fecharModalComentarios()">✕</button>
      </div>
      <div class="modal-box__body">
        <div id="listaComentarios"></div>
      </div>
    </div>
  </div>

  <!-- CSS inline mínimo (mesclar no seu CSS ou deixar aqui) -->
  <style>
    .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
    .modal-backdrop.aberto { display:flex; }
    .modal-box { background:#fff; border-radius:14px; padding:28px 28px 20px; width:100%; max-width:460px; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 8px 40px rgba(0,0,0,.18); }
    .modal-box__header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .modal-box__titulo { font-size:1rem; font-weight:600; }
    .modal-box__close  { background:none; border:none; cursor:pointer; font-size:1.1rem; color:#888; }
    .modal-box__body   { overflow-y:auto; flex:1; }
    .coment-item   { border-bottom:1px solid #f0f0f0; padding:12px 0; }
    .coment-item:last-child { border-bottom:none; }
    .coment-header { display:flex; justify-content:space-between; margin-bottom:4px; }
    .coment-autor  { font-weight:600; font-size:.85rem; color:#374151; }
    .coment-data   { font-size:.75rem; color:#9ca3af; }
    .coment-texto  { font-size:.88rem; color:#4b5563; margin:0; line-height:1.5; }
    .coment-loading,.coment-vazio,.coment-erro { text-align:center; color:#9ca3af; font-size:.88rem; padding:24px 0; }
    .coment-erro { color:#c0392b; }
  </style>

      <!-- Scripts — ordem importa: api.js antes, gestao-ideias.js por último -->
      <script src="../js/api.js"></script>
      <script src="../js/injetahtml.js"></script>
      <script src="../js/gestao-ideias.js"></script>
      
      <script>
      carregarComponente('../components/sidebar.html', 'sidebar-container');
      carregarComponente('../components/topbar.html',  'topbar-container');
    </script>
  </body>
</html>
