<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NationInsight — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/coresgerais.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/topbar.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--bg);
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── LAYOUT — FIX SIDEBAR ── */
    .layout {
      display: flex;
      margin-top: 56px;
      min-height: calc(100vh - 56px);
    }

    /* A sidebar usa position:fixed com width var(--sidebar-w).
       O main precisa de margin-left igual ao width da sidebar. */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-width: 0;
      padding: 0;
    }

    /* ── HERO BANNER ── */
    .hero-banner {
      background: linear-gradient(120deg, var(--azul) 0%, #163a60 60%, #1e4d7a 100%);
      padding: 28px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .hero-banner::after {
      content: '';
      position: absolute;
      right: -60px; top: -60px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(212,175,55,.08);
      pointer-events: none;
    }
    .hero-greeting {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #fff;
    }
    .hero-sub { font-size: .875rem; color: rgba(255,255,255,.65); margin-top: 4px; }
    .hero-pts-badge {
      background: rgba(212,175,55,.15);
      border: 1px solid rgba(212,175,55,.35);
      border-radius: 12px;
      padding: 10px 20px;
      text-align: center;
      position: relative; z-index: 1;
    }
    .hero-pts-badge__num {
      font-family: 'Poppins', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--dourado);
      line-height: 1;
    }
    .hero-pts-badge__label { font-size: .7rem; color: rgba(255,255,255,.6); margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; }

    /* ── CONTENT AREA ── */
    .content { padding: 24px 32px; }

    /* ── KPI GRID ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }

    .kpi-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      border: 1px solid rgba(10,37,64,.07);
      box-shadow: 0 2px 12px rgba(10,37,64,.06);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform .15s, box-shadow .15s;
    }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(10,37,64,.1); }

    .kpi-icon {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .kpi-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #9ca3af; margin-bottom: 3px; }
    .kpi-valor { font-family: 'Poppins', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--azul); line-height: 1; }
    .kpi-sub   { font-size: .72rem; color: #9ca3af; margin-top: 3px; }

    /* ── CHARTS ROW ── */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 1050px) { .charts-row { grid-template-columns: 1fr; } }

    .chart-card {
      background: #fff;
      border-radius: 14px;
      padding: 22px 24px;
      border: 1px solid rgba(10,37,64,.07);
      box-shadow: 0 2px 12px rgba(10,37,64,.06);
    }
    .chart-title { font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 600; color: var(--azul); }
    .chart-sub   { font-size: .75rem; color: #9ca3af; margin-top: 2px; margin-bottom: 20px; }

    /* ── SVG BAR CHART ── */
    .bar-chart-wrap { width: 100%; overflow: hidden; }
    .bar-chart-wrap svg { width: 100%; display: block; }

    /* ── DONUT ── */
    .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .donut-svg-wrap { position: relative; width: 150px; height: 150px; }
    .donut-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .donut-num  { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.4rem; color: var(--azul); line-height: 1; }
    .donut-text { font-size: .65rem; color: #9ca3af; margin-top: 2px; }

    .donut-legend { width: 100%; }
    .donut-legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: #374151;
      padding: 5px 0;
      border-bottom: 1px solid #f5f5f7;
    }
    .donut-legend-item:last-child { border-bottom: none; }
    .donut-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .donut-legend-label { flex: 1; }
    .donut-legend-val   { font-weight: 700; color: var(--azul); font-size: .8rem; }

    /* ── IDEIAS TABLE ── */
    .table-card {
      background: #fff;
      border-radius: 14px;
      padding: 22px 24px;
      border: 1px solid rgba(10,37,64,.07);
      box-shadow: 0 2px 12px rgba(10,37,64,.06);
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title { font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 600; color: var(--azul); }
    .card-link  { font-size: .78rem; color: var(--azul-info); font-weight: 600; text-decoration: none; }
    .card-link:hover { text-decoration: underline; }

    .ideia-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      border-radius: 9px;
      border: 1px solid #f0f2f5;
      margin-bottom: 8px;
      background: #fafafa;
      transition: background .15s;
    }
    .ideia-row:last-child { margin-bottom: 0; }
    .ideia-row:hover { background: #f0f6ff; }

    .ideia-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ideia-body { flex: 1; min-width: 0; }
    .ideia-titulo { font-weight: 600; font-size: .85rem; color: var(--azul); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ideia-meta   { font-size: .72rem; color: #9ca3af; margin-top: 2px; }

    .badge { display: inline-block; border-radius: 20px; padding: 2px 9px; font-size: .7rem; font-weight: 600; white-space: nowrap; }
    .badge--pendente     { background: #f0f2f5;   color: #555; }
    .badge--analise      { background: #fff4e0;   color: #d98200; }
    .badge--aprovada     { background: #e6f9ef;   color: #1a7a42; }
    .badge--rejeitada    { background: #fde8e8;   color: #c0392b; }
    .badge--implementada { background: #f0eaff;   color: #6d28d9; }

    .btn-coment {
      background: none; border: 1.5px solid #e5e7eb; border-radius: 7px;
      padding: 4px 9px; font-size: .72rem; color: #6b7280; cursor: pointer;
      display: flex; align-items: center; gap: 4px; white-space: nowrap;
      transition: border-color .15s, color .15s;
    }
    .btn-coment:hover { border-color: var(--azul-info); color: var(--azul-info); }

    /* ── SKELETON ── */
    .sk { background: #e8ecf0; border-radius: 8px; animation: pulse 1.4s ease-in-out infinite; }
    .sk-kpi { height: 86px; }
    .sk-row { height: 50px; margin-bottom: 8px; }
    .sk-chart { height: 220px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* ── MODAL COMENTÁRIOS ── */
    .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; align-items:center; justify-content:center; }
    .modal-backdrop.aberto { display:flex; }
    .modal-box { background:#fff; border-radius:16px; padding:28px; width:100%; max-width:460px; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 12px 48px rgba(0,0,0,.2); }
    .modal-box__header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .modal-box__titulo { font-family:'Poppins',sans-serif; font-size:.95rem; font-weight:600; color:var(--azul); }
    .modal-box__close  { background:none; border:none; cursor:pointer; font-size:1.1rem; color:#9ca3af; padding:2px; }
    .modal-box__close:hover { color:var(--azul); }
    .modal-box__body   { overflow-y:auto; flex:1; }
    .coment-item   { padding:12px 0; border-bottom:1px solid #f0f2f5; }
    .coment-item:last-child { border-bottom:none; }
    .coment-header { display:flex; justify-content:space-between; margin-bottom:4px; }
    .coment-autor  { font-weight:600; font-size:.82rem; color:var(--azul); }
    .coment-data   { font-size:.72rem; color:#9ca3af; }
    .coment-texto  { font-size:.85rem; color:#4b5563; line-height:1.55; }
    .coment-empty,.coment-loading,.coment-erro { text-align:center; color:#9ca3af; font-size:.85rem; padding:28px 0; }
    .coment-erro { color:#c0392b; }

    .empty-state { text-align:center; padding:36px; color:#9ca3af; }
    .empty-icon  { font-size:2rem; display:block; margin-bottom:8px; }
  </style>
</head>
<body>
  <div id="topbar-container"></div>

  <div class="layout">
    <div id="sidebar-container"></div>

    <main class="main">

      <!-- HERO -->
      <div class="hero-banner">
        <div>
          <div class="hero-greeting" id="heroGreeting">Olá! 👋</div>
          <div class="hero-sub">Acompanhe seus pontos, suas ideias e seu progresso.</div>
        </div>
        <div class="hero-pts-badge" id="heroPtsBadge" style="display:none">
          <div class="hero-pts-badge__num" id="heroPts">0</div>
          <div class="hero-pts-badge__label">⭐ Pontos acumulados</div>
        </div>
      </div>

      <div class="content">

        <!-- KPIs -->
        <div class="kpi-grid" id="kpiGrid">
          <div class="kpi-card sk sk-kpi"></div>
          <div class="kpi-card sk sk-kpi"></div>
          <div class="kpi-card sk sk-kpi"></div>
          <div class="kpi-card sk sk-kpi"></div>
        </div>

        <!-- GRÁFICOS -->
        <div class="charts-row">
          <!-- Barras: ideias por status -->
          <div class="chart-card">
            <div class="chart-title">Ideias por Status</div>
            <div class="chart-sub">Distribuição de todas as suas ideias</div>
            <div class="bar-chart-wrap" id="barChartWrap">
              <div class="sk sk-chart"></div>
            </div>
          </div>

          <!-- Donut: proporção -->
          <div class="chart-card">
            <div class="chart-title">Visão Geral</div>
            <div class="chart-sub">Proporção por resultado</div>
            <div class="donut-wrap">
              <div class="donut-svg-wrap" id="donutWrap">
                <div class="sk" style="width:150px;height:150px;border-radius:50%"></div>
              </div>
              <div class="donut-legend" id="donutLegend"></div>
            </div>
          </div>
        </div>

        <!-- LISTA DE IDEIAS -->
        <div class="table-card">
          <div class="card-header">
            <span class="card-title">💡 Minhas Ideias</span>
            <a class="card-link" href="ideias.html">Ver todas →</a>
          </div>
          <div id="listaIdeias">
            <div class="sk sk-row"></div>
            <div class="sk sk-row"></div>
            <div class="sk sk-row"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal comentários -->
  <div class="modal-backdrop" id="modalVerComentarios">
    <div class="modal-box">
      <div class="modal-box__header">
        <span class="modal-box__titulo" id="modalComentariosTitulo">Comentários</span>
        <button class="modal-box__close" onclick="fecharModalComentarios()">✕</button>
      </div>
      <div class="modal-box__body">
        <div id="listaComentarios"></div>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/comentarios-modal.js"></script>

  <script>
  // ─────────────────────────────────────────────────────────────────────────
  // CONFIG
  // ─────────────────────────────────────────────────────────────────────────
  const STATUS_MAP = {
    'Pendente':      { cor: '#9ca3af', dotCor: '#9ca3af', label: 'Pendente' },
    'Em Análise':    { cor: '#f59e0b', dotCor: '#f59e0b', label: 'Em Análise' },
    'Aprovada':      { cor: '#10b981', dotCor: '#10b981', label: 'Aprovada' },
    'Implementada':  { cor: '#8b5cf6', dotCor: '#8b5cf6', label: 'Implementada' },
    'Rejeitada':     { cor: '#ef4444', dotCor: '#ef4444', label: 'Rejeitada' },
  };

  const slugStatus = s => ({
    'Pendente':'pendente','Em Análise':'analise',
    'Aprovada':'aprovada','Rejeitada':'rejeitada','Implementada':'implementada'
  }[s] || 'pendente');

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─────────────────────────────────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    checkAuth();
    const usu = getUsuario();
    if (usu?.nome) {
      document.getElementById('heroGreeting').textContent = `Olá, ${usu.nome.split(' ')[0]}! 👋`;
    }
    await carregarDashboard();
  });

  // ─────────────────────────────────────────────────────────────────────────
  // DADOS
  // ─────────────────────────────────────────────────────────────────────────
  async function carregarDashboard() {
    try {
      const ideias = await api('GET', '/ideias/minhas');
      const usu    = getUsuario();
      const pontos = usu?.pontos ?? usu?.saldoPontos_usu ?? 0;

      // Contagens por status
      const cnts = {};
      ideias.forEach(i => { cnts[i.status] = (cnts[i.status] || 0) + 1; });

      const aprovadas     = cnts['Aprovada']     || 0;
      const implementadas = cnts['Implementada'] || 0;
      const rejeitadas    = cnts['Rejeitada']    || 0;
      const emAnalise     = cnts['Em Análise']   || 0;
      const pendentes     = cnts['Pendente']     || 0;
      const total         = ideias.length;

      // Pontos hero badge
      if (pontos > 0) {
        document.getElementById('heroPts').textContent = Number(pontos).toLocaleString('pt-BR');
        document.getElementById('heroPtsBadge').style.display = '';
      }

      renderKPIs({ pontos, total, aprovadas, implementadas });
      renderBarChart(cnts, total);
      renderDonut(cnts, total);
      renderIdeias(ideias.slice(0, 8));

    } catch (err) {
      document.getElementById('listaIdeias').innerHTML =
        `<div class="empty-state"><span class="empty-icon">⚠️</span><p>${esc(err.message)}</p></div>`;
    }
  }

  // ─────────────────────────────────────────────────────────────────────────
  // KPIs
  // ─────────────────────────────────────────────────────────────────────────
  function renderKPIs({ pontos, total, aprovadas, implementadas }) {
    const taxa = total > 0 ? Math.round(((aprovadas + implementadas) / total) * 100) : 0;

    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card">
        <div class="kpi-icon" style="background:#eff6ff;color:#2563eb">⭐</div>
        <div>
          <div class="kpi-label">Pontos</div>
          <div class="kpi-valor">${Number(pontos).toLocaleString('pt-BR')}</div>
          <div class="kpi-sub">saldo atual</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon" style="background:#fefce8;color:#ca8a04">💡</div>
        <div>
          <div class="kpi-label">Ideias Enviadas</div>
          <div class="kpi-valor">${total}</div>
          <div class="kpi-sub">total cadastrado</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon" style="background:#f0fdf4;color:#16a34a">✅</div>
        <div>
          <div class="kpi-label">Aprovadas</div>
          <div class="kpi-valor">${aprovadas + implementadas}</div>
          <div class="kpi-sub">aprovadas + impl.</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon" style="background:#f5f3ff;color:#7c3aed">📈</div>
        <div>
          <div class="kpi-label">Taxa de Sucesso</div>
          <div class="kpi-valor">${taxa}%</div>
          <div class="kpi-sub">ideias aprovadas</div>
        </div>
      </div>
    `;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // BAR CHART (SVG puro)
  // ─────────────────────────────────────────────────────────────────────────
  function renderBarChart(cnts, total) {
    const wrap = document.getElementById('barChartWrap');

    const ordens = ['Pendente','Em Análise','Aprovada','Implementada','Rejeitada'];
    const dados  = ordens.map(s => ({ label: s, val: cnts[s] || 0, cor: STATUS_MAP[s].cor }));
    const maxVal = Math.max(...dados.map(d => d.val), 1);

    const W = 560, H = 200, padL = 30, padB = 36, padTop = 16, barW = 58, gap = 20;

    const barTotW = dados.length * barW + (dados.length - 1) * gap;
    const startX  = padL + (W - padL - barTotW) / 2;

    let bars = '';
    dados.forEach((d, i) => {
      const x       = startX + i * (barW + gap);
      const barH    = d.val > 0 ? Math.max(((d.val / maxVal) * (H - padB - padTop)), 8) : 0;
      const y       = H - padB - barH;
      const labelY  = H - padB + 18;
      const valY    = y - 6;

      bars += `
        <rect x="${x}" y="${y}" width="${barW}" height="${barH}"
              rx="6" fill="${d.cor}" opacity="0.85"/>
        ${d.val > 0 ? `<text x="${x + barW/2}" y="${valY}" text-anchor="middle"
              font-family="Poppins,sans-serif" font-size="13" font-weight="700"
              fill="${d.cor}">${d.val}</text>` : ''}
        <text x="${x + barW/2}" y="${labelY}" text-anchor="middle"
              font-family="Open Sans,sans-serif" font-size="10.5" fill="#9ca3af">${d.label}</text>
      `;
    });

    // linha base
    const lineY = H - padB;
    bars = `<line x1="${padL}" y1="${lineY}" x2="${W}" y2="${lineY}" stroke="#e8ecf0" stroke-width="1.5"/>` + bars;

    wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // DONUT CHART (SVG puro)
  // ─────────────────────────────────────────────────────────────────────────
  function renderDonut(cnts, total) {
    const wrap   = document.getElementById('donutWrap');
    const legend = document.getElementById('donutLegend');

    const ordens = ['Aprovada','Implementada','Em Análise','Pendente','Rejeitada'];
    const dados  = ordens.map(s => ({ label: s, val: cnts[s] || 0, cor: STATUS_MAP[s].cor })).filter(d => d.val > 0);

    if (!total || !dados.length) {
      wrap.innerHTML   = `<div class="sk" style="width:150px;height:150px;border-radius:50%"></div>`;
      legend.innerHTML = '<p class="coment-empty">Nenhuma ideia ainda</p>';
      return;
    }

    const R = 62, r = 38, cx = 75, cy = 75;
    let startAngle = -Math.PI / 2;
    let paths = '';

    dados.forEach(d => {
      const angle = (d.val / total) * 2 * Math.PI;
      const x1 = cx + R * Math.cos(startAngle);
      const y1 = cy + R * Math.sin(startAngle);
      const x2 = cx + R * Math.cos(startAngle + angle);
      const y2 = cy + R * Math.sin(startAngle + angle);
      const x3 = cx + r * Math.cos(startAngle + angle);
      const y3 = cy + r * Math.sin(startAngle + angle);
      const x4 = cx + r * Math.cos(startAngle);
      const y4 = cy + r * Math.sin(startAngle);
      const lg = angle > Math.PI ? 1 : 0;

      paths += `<path d="M${x1},${y1} A${R},${R} 0 ${lg},1 ${x2},${y2}
                          L${x3},${y3} A${r},${r} 0 ${lg},0 ${x4},${y4} Z"
                      fill="${d.cor}" opacity="0.9"/>`;
      startAngle += angle;
    });

    wrap.innerHTML = `
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg" style="width:150px;height:150px">${paths}</svg>
      <div class="donut-center">
        <div class="donut-num">${total}</div>
        <div class="donut-text">ideias</div>
      </div>
    `;

    legend.innerHTML = dados.map(d => {
      const pct = Math.round((d.val / total) * 100);
      return `
        <div class="donut-legend-item">
          <div class="donut-dot" style="background:${d.cor}"></div>
          <span class="donut-legend-label">${d.label}</span>
          <span class="donut-legend-val">${d.val} <span style="font-weight:400;color:#9ca3af">(${pct}%)</span></span>
        </div>
      `;
    }).join('');
  }

  // ─────────────────────────────────────────────────────────────────────────
  // LISTA DE IDEIAS
  // ─────────────────────────────────────────────────────────────────────────
  function renderIdeias(ideias) {
    const el = document.getElementById('listaIdeias');

    if (!ideias.length) {
      el.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📭</span>
          <p>Você ainda não enviou nenhuma ideia.<br>
          <a href="ideias.html" style="color:var(--azul-info)">Enviar minha primeira ideia →</a></p>
        </div>`;
      return;
    }

    el.innerHTML = ideias.map(i => {
      const cor = STATUS_MAP[i.status]?.dotCor || '#9ca3af';
      return `
        <div class="ideia-row">
          <div class="ideia-dot" style="background:${cor}"></div>
          <div class="ideia-body">
            <div class="ideia-titulo">${esc(i.titulo)}</div>
            <div class="ideia-meta">${i.data || ''} ${i.categoria_nome ? '· ' + esc(i.categoria_nome) : ''}</div>
          </div>
          <span class="badge badge--${slugStatus(i.status)}">${i.status}</span>
          ${(i.pontos ?? i.pts) ? `<span style="font-size:.72rem;font-weight:700;color:var(--dourado);background:rgba(212,175,55,.1);padding:2px 8px;border-radius:10px">+${i.pontos ?? i.pts} pts</span>` : ''}
          <button class="btn-coment" onclick="abrirModalComentarios(${i.id}, '${esc(i.titulo).replace(/'/g,"\\'")}')">
            <i class="fa-regular fa-comment-dots"></i> ${i.comentarios || 0}
          </button>
        </div>
      `;
    }).join('');
  }
  </script>

  <script src="../js/injetahtml.js"></script>
  <script>
    carregarComponente('../components/sidebar.html', 'sidebar-container');
    carregarComponente('../components/topbar.html',  'topbar-container');
  </script>
</body>
</html>
